<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крестики-Нолики Neo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #080808;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }
        
        .font-orbitron {
            font-family: 'Orbitron', sans-serif;
        }

        /* Neon Glow Effects matching requested hex codes */
        .glow-red {
            filter: drop-shadow(0 0 8px #FF0000) drop-shadow(0 0 15px rgba(255, 0, 0, 0.6));
        }
        
        .glow-blue {
            filter: drop-shadow(0 0 8px #0000F0) drop-shadow(0 0 15px rgba(0, 0, 240, 0.6));
        }

        .border-neon {
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.05), inset 0 0 15px rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .border-neon:hover {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1), inset 0 0 20px rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .grid-cell {
            position: relative;
            background: rgba(255, 255, 255, 0.01);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .grid-cell:active {
            transform: scale(0.95);
        }

        /* Custom scrollbar for cyber aesthetic */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #080808;
        }
        ::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        /* Pulsing animation for active turn indicator */
        @keyframes pulse-red {
            0%, 100% { transform: scale(1); opacity: 0.8; filter: drop-shadow(0 0 5px #FF0000); }
            50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 12px #FF0000); }
        }

        @keyframes pulse-blue {
            0%, 100% { transform: scale(1); opacity: 0.8; filter: drop-shadow(0 0 5px #0000F0); }
            50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 12px #0000F0); }
        }

        .active-red {
            animation: pulse-red 2s infinite ease-in-out;
            color: #FF0000;
        }

        .active-blue {
            animation: pulse-blue 2s infinite ease-in-out;
            color: #0000F0;
        }

        /* Winning Line Overlays */
        .win-line {
            position: absolute;
            background: white;
            z-index: 10;
            transition: all 0.5s ease;
            transform-origin: left center;
            border-radius: 9999px;
            pointer-events: none;
        }

        .win-line.red {
            background: #FF0000;
            box-shadow: 0 0 20px #FF0000, 0 0 40px #FF0000;
        }

        .win-line.blue {
            background: #0000F0;
            box-shadow: 0 0 20px #0000F0, 0 0 40px #0000F0;
        }

        /* Neon focus borders for inputs */
        .cyber-input:focus {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-4 relative text-white">
    
    <!-- Background Canvas for futuristic particles -->
    <canvas id="bg-canvas" class="absolute inset-0 w-full h-full pointer-events-none z-0"></canvas>

    <header class="w-full max-w-lg mx-auto z-10 text-center pt-2">
        <h1 class="font-orbitron text-4xl font-extrabold tracking-wider text-white mb-1">
            NEO<span class="text-[#FF0000] glow-red">X</span><span class="text-[#0000F0] glow-blue">O</span>
        </h1>
        <p class="text-[10px] text-gray-500 tracking-widest text-xs">Крестики-нолики нового поколения</p>
    </header>

    <!-- MAIN MENU CONTAINER -->
    <div id="main-menu" class="w-full max-w-md mx-auto z-10 my-auto flex flex-col gap-6 p-6 border-neon rounded-2xl bg-black/80 backdrop-blur-md transition-all duration-300">
        <h2 class="font-orbitron text-lg font-bold text-center tracking-widest border-b border-white/10 pb-3">Настройки сражения</h2>
        
        <!-- Mode Selectors (3 Columns now) -->
        <div class="flex flex-col gap-2">
            <span class="text-[10px] text-gray-400 font-semibold tracking-wider">Режим игры</span>
            <div class="grid grid-cols-3 gap-1.5 bg-neutral-900/50 p-1 rounded-xl border border-white/5">
                <button id="menu-mode-ai-btn" class="py-2.5 px-2 rounded-lg font-semibold text-[10px] transition-all tracking-wider bg-white/10 text-white shadow" onclick="setGameMode('ai')">
                    Против ИИ
                </button>
                <button id="menu-mode-pvp-btn" class="py-2.5 px-2 rounded-lg font-semibold text-[10px] transition-all tracking-wider text-gray-400 hover:text-white" onclick="setGameMode('pvp')">
                    2 Игрока
                </button>
                <button id="menu-mode-online-btn" class="py-2.5 px-2 rounded-lg font-semibold text-[10px] transition-all tracking-wider text-gray-400 hover:text-white" onclick="setGameMode('online')">
                    По сети
                </button>
            </div>
        </div>

        <!-- Player Names Inputs (Local Modes) -->
        <div id="local-names-panel" class="flex flex-col gap-4">
            <div class="flex flex-col gap-1.5">
                <label class="text-[10px] text-gray-400 font-semibold tracking-wider">Игрок 1 (X) <span class="text-[#FF0000]">•</span></label>
                <input type="text" id="p1-name-input" value="Игрок 1" maxlength="15"
                       class="cyber-input w-full bg-neutral-900/80 border border-neutral-800 rounded-xl px-4 py-3 text-sm text-white font-semibold outline-none transition-all tracking-wide">
            </div>

            <div class="flex flex-col gap-1.5" id="p2-input-container">
                <label class="text-[10px] text-gray-400 font-semibold tracking-wider">Игрок 2 (O) <span class="text-[#0000F0]">•</span></label>
                <input type="text" id="p2-name-input" value="ИИ" maxlength="15"
                       class="cyber-input w-full bg-neutral-900/80 border border-neutral-800 rounded-xl px-4 py-3 text-sm text-white font-semibold outline-none transition-all tracking-wide">
            </div>
        </div>

        <!-- Player Names Inputs (Online Mode) -->
        <div id="online-setup-panel" class="hidden flex flex-col gap-4">
            <div class="flex flex-col gap-1.5">
                <label class="text-[10px] text-gray-400 font-semibold tracking-wider">Ваш никнейм в сети</label>
                <input type="text" id="online-nickname" value="Игрок" maxlength="15"
                       class="cyber-input w-full bg-neutral-900/80 border border-neutral-800 rounded-xl px-4 py-3 text-sm text-white font-semibold outline-none transition-all tracking-wide">
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-[10px] text-gray-400 font-semibold tracking-wider">Код комнаты (для входа или создания)</label>
                <div class="flex gap-2">
                    <input type="text" id="online-room-id" placeholder="Напр. 1234" maxlength="6"
                           class="cyber-input w-full bg-neutral-900/80 border border-neutral-800 rounded-xl px-4 py-3 text-sm text-white font-semibold outline-none transition-all tracking-wide uppercase">
                    <button onclick="generateRandomRoomId()" class="px-4 bg-neutral-850 hover:bg-neutral-800 rounded-xl border border-white/10 text-xs font-semibold transition-all">Случ.</button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2 mt-2">
                <button onclick="startOnlineGame('create')" class="py-3 px-4 rounded-xl font-orbitron font-extrabold text-xs tracking-widest text-black bg-white hover:bg-neutral-200 transition-all shadow-md active:scale-[0.98]">
                    Создать
                </button>
                <button onclick="startOnlineGame('join')" class="py-3 px-4 rounded-xl font-orbitron font-extrabold text-xs tracking-widest text-white bg-neutral-900 hover:bg-neutral-850 border border-white/10 transition-all active:scale-[0.98]">
                    Войти
                </button>
            </div>
        </div>

        <!-- Difficulty Settings -->
        <div id="menu-difficulty-panel" class="flex flex-col gap-2 transition-all duration-300">
            <span class="text-[10px] text-gray-400 font-semibold tracking-wider">Сложность ИИ</span>
            <div class="grid grid-cols-3 gap-2 bg-neutral-950/80 p-1 rounded-xl border border-white/5">
                <button id="menu-diff-easy" class="py-2 px-1 rounded-lg font-medium text-[10px] transition-all tracking-wider text-gray-400 hover:text-white" onclick="setDifficulty('easy')">
                    Легко
                </button>
                <button id="menu-diff-medium" class="py-2 px-1 rounded-lg font-medium text-[10px] transition-all tracking-wider text-white bg-white/5" onclick="setDifficulty('medium')">
                    Нормально
                </button>
                <button id="menu-diff-hard" class="py-2 px-1 rounded-lg font-medium text-[10px] transition-all tracking-wider text-gray-400 hover:text-white" onclick="setDifficulty('hard')">
                    Эксперт
                </button>
            </div>
        </div>

        <!-- Start Game Button (Local Only) -->
        <button id="start-game-btn" onclick="startGame()" class="mt-2 py-4 px-6 rounded-xl font-orbitron font-extrabold text-sm tracking-widest text-black bg-white hover:bg-neutral-200 transition-all shadow-[0_0_20px_rgba(255,255,255,0.15)] active:scale-[0.98]">
            Запустить сеть
        </button>

        <!-- Cloud Save Sync Status Indicator -->
        <div id="sync-container" class="flex items-center justify-center gap-2 mt-1 border-t border-white/5 pt-4">
            <span id="sync-dot" class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>
            <span id="sync-text" class="text-[10px] text-gray-500 tracking-widest">Подключение к сети...</span>
        </div>
    </div>

    <!-- GAME BOARD SCREEN CONTAINER -->
    <main id="game-screen" class="hidden w-full max-w-md mx-auto z-10 my-auto flex flex-col gap-4 items-center">
        
        <!-- Room Code Badge (Online mode only) -->
        <div id="room-code-badge" class="hidden w-full text-center text-[10px] text-gray-400 tracking-widest font-semibold border-neon p-2.5 rounded-2xl bg-black/60">
            Комната: <span id="room-code-val" class="text-white font-bold font-orbitron"></span>
        </div>

        <!-- Scoreboard -->
        <div class="grid grid-cols-3 gap-3 w-full border-neon rounded-2xl p-4 bg-black/60 backdrop-blur-md">
            <!-- Player X Info -->
            <div class="flex flex-col items-center justify-center p-2 rounded-xl transition-all" id="score-x-container">
                <span class="text-xs text-gray-400 font-semibold mb-1 tracking-wider">Крестик (X)</span>
                <span class="font-orbitron text-2xl font-bold text-[#FF0000] glow-red" id="score-x">0</span>
                <span class="text-[10px] text-gray-500 mt-1 truncate max-w-[100px]" id="label-x">Игрок 1</span>
            </div>
            
            <!-- Ties Info -->
            <div class="flex flex-col items-center justify-center p-2 rounded-xl border-x border-gray-800/50">
                <span class="text-xs text-gray-400 font-semibold mb-1 tracking-wider">Ничьи</span>
                <span class="font-orbitron text-2xl font-bold text-gray-300" id="score-ties">0</span>
                <span class="text-[10px] text-gray-500 mt-1">Всего</span>
            </div>
            
            <!-- Player O Info -->
            <div class="flex flex-col items-center justify-center p-2 rounded-xl transition-all" id="score-o-container">
                <span class="text-xs text-gray-400 font-semibold mb-1 tracking-wider">Нолик (O)</span>
                <span class="font-orbitron text-2xl font-bold text-[#0000F0] glow-blue" id="score-o">0</span>
                <span class="text-[10px] text-gray-500 mt-1 truncate max-w-[100px]" id="label-o">ИИ</span>
            </div>
        </div>

        <!-- Game Board Grid -->
        <div class="relative w-full aspect-square border-neon rounded-2xl p-4 bg-black/40 backdrop-blur-sm overflow-hidden" id="board-container">
            <!-- Decorative Cyber Grid Overlay -->
            <div class="absolute inset-0 bg-[radial-gradient(#111_1px,transparent_1px)] [background-size:16px_16px] opacity-30 pointer-events-none"></div>
            
            <!-- Win Line Container (Dynamic placement via JS) -->
            <div id="win-line" class="win-line hidden"></div>

            <div class="grid grid-cols-3 grid-rows-3 gap-3 h-full relative z-20">
                <!-- 9 grid cells -->
                <button class="grid-cell rounded-xl flex items-center justify-center border border-white/5 focus:outline-none" data-index="0" onclick="cellClicked(0)"></button>
                <button class="grid-cell rounded-xl flex items-center justify-center border border-white/5 focus:outline-none" data-index="1" onclick="cellClicked(1)"></button>
                <button class="grid-cell rounded-xl flex items-center justify-center border border-white/5 focus:outline-none" data-index="2" onclick="cellClicked(2)"></button>
                <button class="grid-cell rounded-xl flex items-center justify-center border border-white/5 focus:outline-none" data-index="3" onclick="cellClicked(3)"></button>
                <button class="grid-cell rounded-xl flex items-center justify-center border border-white/5 focus:outline-none" data-index="4" onclick="cellClicked(4)"></button>
                <button class="grid-cell rounded-xl flex items-center justify-center border border-white/5 focus:outline-none" data-index="5" onclick="cellClicked(5)"></button>
                <button class="grid-cell rounded-xl flex items-center justify-center border border-white/5 focus:outline-none" data-index="6" onclick="cellClicked(6)"></button>
                <button class="grid-cell rounded-xl flex items-center justify-center border border-white/5 focus:outline-none" data-index="7" onclick="cellClicked(7)"></button>
                <button class="grid-cell rounded-xl flex items-center justify-center border border-white/5 focus:outline-none" data-index="8" onclick="cellClicked(8)"></button>
            </div>
        </div>

        <!-- Status & Reset Panel -->
        <div class="w-full flex items-center justify-between gap-4">
            <!-- Turn & Game status indicator -->
            <div class="flex items-center gap-2">
                <span class="text-xs text-gray-500 tracking-widest font-semibold">Ход:</span>
                <div id="status-badge" class="font-orbitron text-sm font-black tracking-widest flex items-center gap-1.5">
                    <span id="status-text" class="text-[#FF0000] glow-red">X</span>
                </div>
            </div>

            <!-- Controls (Mute, Back to Menu, Reset) -->
            <div class="flex items-center gap-1.5">
                <button id="sound-btn" class="p-2.5 rounded-xl border-neon bg-neutral-900/60 text-gray-400 hover:text-white transition-all" onclick="toggleMute()" title="Звук">
                    <!-- Speaker icon -->
                    <svg id="sound-icon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    </svg>
                </button>
                <button class="py-2.5 px-4 rounded-xl border-neon font-bold text-[10px] tracking-wider text-gray-400 bg-neutral-900/60 hover:text-white transition-all" onclick="backToMenu()">
                    В меню
                </button>
                <button class="py-2.5 px-4 rounded-xl border-neon font-bold text-[10px] tracking-wider text-white bg-gradient-to-r from-neutral-900 to-neutral-850 hover:from-neutral-800 hover:to-neutral-750 transition-all flex items-center gap-1" onclick="resetGame(true)">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H17" />
                    </svg>
                    Сбросить
                </button>
            </div>
        </div>
    </main>

    <footer class="w-full text-center py-2 z-10">
        <p class="text-[8px] text-gray-600 tracking-widest">Разработано с заботой о стиле • #080808 • #FF0000 • #0000F0</p>
    </footer>

    <!-- Floating In-game custom Modal/Notification -->
    <div id="game-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300">
        <div class="border-neon bg-[#080808] p-8 rounded-2xl max-w-xs w-full text-center flex flex-col items-center gap-6 shadow-2xl relative">
            <div id="modal-symbol-container" class="w-20 h-20 flex items-center justify-center">
                <!-- SVG injected dynamically -->
            </div>
            <div>
                <h3 id="modal-title" class="font-orbitron text-2xl font-black tracking-wide text-white">Победа!</h3>
                <p id="modal-message" class="text-xs text-gray-400 mt-2 tracking-widest">Крестик сокрушил соперника</p>
            </div>
            <button class="w-full py-3 px-6 rounded-xl border-neon bg-white text-black font-extrabold text-xs tracking-wider hover:bg-neutral-200 transition-all shadow-md shadow-white/10" onclick="closeModalAndReset()">
                Следующий раунд
            </button>
        </div>
    </div>

    <!-- Floating Custom Toast Notification System -->
    <div id="toast-notification" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-[#080808]/90 border border-neutral-800 text-white px-6 py-3 rounded-xl shadow-lg transition-all duration-300 opacity-0 pointer-events-none text-xs tracking-widest font-semibold">
        Уведомление
    </div>

    <!-- Firestore Storage Integration script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global variables provided by environment (or fallbacks)
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'neo-xo-default';
        
        // Ваша персональная конфигурация Firebase
        const userFirebaseConfig = {
            apiKey: "AIzaSyCTsrje0oauPUvoX1MKY56tp9EijUV5kLM",
            authDomain: "neo-x-o.firebaseapp.com",
            databaseURL: "https://neo-x-o-default-rtdb.firebaseio.com",
            projectId: "neo-x-o",
            storageBucket: "neo-x-o.firebasestorage.app",
            messagingSenderId: "282189679516",
            appId: "1:282189679516:web:c58a2d618ef25d4d0b9659",
            measurementId: "G-LKLEVHTKHZ"
        };

        const rawConfig = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
        
        let firebaseApp, db, auth;
        let userId = null;
        let isCloudActive = false;

        // Establish connection to Firebase
        try {
            const firebaseConfig = rawConfig ? JSON.parse(rawConfig) : userFirebaseConfig;
            firebaseApp = initializeApp(firebaseConfig);
            db = getFirestore(firebaseApp);
            auth = getAuth(firebaseApp);
            isCloudActive = true;
        } catch (e) {
            console.warn("Could not initialize Firebase configuration. Using offline fallback.", e);
        }

        // Authentication & Save/Load routines
        async function initSync() {
            if (!isCloudActive) {
                showSyncStatus('offline');
                return;
            }

            try {
                showSyncStatus('connecting');
                let userCredential;
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    userCredential = await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    userCredential = await signInAnonymously(auth);
                }
                userId = userCredential.user.uid;
                await loadCloudData();
            } catch (err) {
                console.error("Auth and Sync setup failed:", err);
                showSyncStatus('error');
            }
        }

        // Load game state from Firestore
        async function loadCloudData() {
            if (!userId || !isCloudActive) return;
            try {
                showSyncStatus('loading');
                const docRef = doc(db, 'artifacts', appId, 'users', userId, 'game_state', 'current');
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // Recover properties safely
                    window.player1Name = data.player1Name || "Игрок 1";
                    window.player2Name = data.player2Name || "ИИ";
                    window.scores = data.scores || { X: 0, O: 0, ties: 0 };
                    window.gameMode = data.gameMode || 'ai';
                    window.difficulty = data.difficulty || 'medium';
                    window.isMuted = data.isMuted !== undefined ? data.isMuted : false;

                    // Update UI input values
                    document.getElementById('p1-name-input').value = window.player1Name;
                    document.getElementById('p2-name-input').value = window.player2Name;
                    
                    // Synchronize settings screen indicators
                    window.applyLoadedSettings();
                    showSyncStatus('synced');
                } else {
                    showSyncStatus('synced'); // No past state is also fine, counts as synced
                }
            } catch (e) {
                console.error("Error fetching cloud state:", e);
                showSyncStatus('error');
            }
        }

        // Save state to Firestore
        async function saveCloudData() {
            if (!userId || !isCloudActive) return;
            try {
                showSyncStatus('saving');
                const docRef = doc(db, 'artifacts', appId, 'users', userId, 'game_state', 'current');
                
                // Defensive fallback to prevent any 'undefined' field errors in Firestore
                const p1 = window.player1Name !== undefined ? window.player1Name : "Игрок 1";
                const p2 = window.player2Name !== undefined ? window.player2Name : "ИИ";
                const sc = window.scores !== undefined ? window.scores : { X: 0, O: 0, ties: 0 };
                const gm = window.gameMode !== undefined ? window.gameMode : 'ai';
                const diff = window.difficulty !== undefined ? window.difficulty : 'medium';
                const muted = window.isMuted !== undefined ? window.isMuted : false;

                await setDoc(docRef, {
                    player1Name: p1,
                    player2Name: p2,
                    scores: sc,
                    gameMode: gm,
                    difficulty: diff,
                    isMuted: muted,
                    updatedAt: new Date().toISOString()
                });
                showSyncStatus('synced');
            } catch (e) {
                console.error("Error setting cloud state:", e);
                showSyncStatus('error');
            }
        }

        function showSyncStatus(status) {
            const dot = document.getElementById('sync-dot');
            const txt = document.getElementById('sync-text');
            const container = document.getElementById('sync-container');
            if (!dot || !txt || !container) return;

            switch (status) {
                case 'offline':
                    container.classList.remove('hidden');
                    dot.className = "w-2 h-2 rounded-full bg-zinc-600";
                    txt.innerText = "Автономный профиль";
                    break;
                case 'connecting':
                    container.classList.remove('hidden');
                    dot.className = "w-2 h-2 rounded-full bg-amber-500 animate-pulse";
                    txt.innerText = "Подключение к сети...";
                    break;
                case 'loading':
                    container.classList.remove('hidden');
                    dot.className = "w-2 h-2 rounded-full bg-blue-500 animate-pulse";
                    txt.innerText = "Синхронизация профиля...";
                    break;
                case 'saving':
                    container.classList.remove('hidden');
                    dot.className = "w-2 h-2 rounded-full bg-amber-400 animate-ping";
                    txt.innerText = "Сохранение в облако...";
                    break;
                case 'synced':

        // Start multiplayer session
        window.startOnlineGame = async function(action) {
            const nickname = document.getElementById('online-nickname').value.trim();
            const roomIdInput = document.getElementById('online-room-id').value.trim();
            
            if (!nickname) {
                showToast("Введите ваш никнейм в сети", "error");
                return;
            }
            if (!roomIdInput) {
                showToast("Введите код комнаты", "error");
                return;
            }
            
            const roomId = roomIdInput.toLowerCase();
            window.currentRoomId = roomId;
            
            if (!userId || !isCloudActive) {
                showToast("Нет подключения к сети Firebase. Попробуйте снова", "error");

            }
            
            showToast("Подключение к комнате...", "info");
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', roomId);
            
            if (action === 'create') {
                try {
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        showToast("Комната уже существует. Выберите другой код", "error");

                    window.mySymbol = 'X';

                    window.player2Name = "Ожидание...";

                    await setDoc(docRef, {

                        currentPlayer: 'X',
                        p1Id: userId,
                        p1Name: nickname,
                        p2Id: '',

                        winner: '',

                        lastUpdated: new Date().toISOString()
                    });
                    
                    setupOnlineListener(docRef);
                    enterOnlineGameScreen();
                } catch (e) {
                    console.error("Error creating online room:", e);
                    showToast("Не удалось создать комнату", "error");
                }
            } else if (action === 'join') {
                try {
                    const docSnap = await getDoc(docRef);
                    if (!docSnap.exists()) {
                        showToast("Комната не найдена", "error");
                        return;
                    }
                    
                    const data = docSnap.data();
                    if (data.p2Id && data.p2Id !== userId) {
                        showToast("Комната уже заполнена", "error");
                        return;
                    }
                    
                    window.mySymbol = 'O';
                    window.isMyTurn = false;
                    window.player1Name = data.p1Name;
                    window.player2Name = nickname;
                    window.scores = { X: 0, O: 0, ties: 0 };
                    
                    await updateDoc(docRef, {
                        p2Id: userId,
                        p2Name: nickname,
                        status: 'playing',
                        lastUpdated: new Date().toISOString()
                    });
                    
                    setupOnlineListener(docRef);
                    enterOnlineGameScreen();
                } catch (e) {
                    console.error("Error joining online room:", e);
                    showToast("Не удалось подключиться", "error");
                }
            }
        };

        let unsubscribe = null;
        function setupOnlineListener(docRef) {
            if (unsubscribe) unsubscribe();
            
            unsubscribe = onSnapshot(docRef, (snapshot) => {
                if (!snapshot.exists()) {
                    showToast("Комната закрыта или удалена", "error");
                    backToMenu();
                    return;
                }
                
                const data = snapshot.data();
                
                // Sync player labels
                window.player1Name = data.p1Name || "Игрок 1";
                window.player2Name = data.p2Name || "Ожидание...";
                updateScoresUI();
                
                // Sync local board with cloud data
                window.syncBoardState(data.board);
                
                window.onlineStatus = data.status;
                window.onlineCurrentPlayer = data.currentPlayer;
                
                // Match active turn styling
                if (data.status === 'playing') {
                    currentPlayer = data.currentPlayer;
                    window.isMyTurn = (data.currentPlayer === window.mySymbol);
                    updateTurnIndicator();
                } else if (data.status === 'waiting') {
                    const statusText = document.getElementById('status-text');
                    statusText.className = "text-[#FF0000] glow-red animate-pulse";
                    statusText.innerText = "Ожидание соперника...";
                    window.isMyTurn = false;
                }
                
                // Trigger modal on game completion
                if (data.status === 'finished') {
                    isGameActive = false;
                    if (data.winner === 'tie') {
                        window.handleGameOverDirect('tie');
                    } else {
                        window.handleGameOverDirect('win', data.winner, data.winCombo);
                    }
                } else {
                    isGameActive = true;
                }
                
            }, (err) => {
                console.error("Snapshot error:", err);
                showToast("Ошибка сетевого соединения с комнатой", "error");
            });
            
            window.activeOnlineUnsubscribe = unsubscribe;
        }

        // Submit move selection to Firestore
        window.makeOnlineMove = async function(cellIndex) {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', window.currentRoomId);
            
            const newBoard = [...board];
            newBoard[cellIndex] = window.mySymbol;
            
            const isWinner = checkWin(newBoard, window.mySymbol);
            const isTie = !isWinner && !newBoard.includes('');
            
            let status = 'playing';
            let winner = '';
            let winCombo = [];
            
            if (isWinner) {
                status = 'finished';
                winner = window.mySymbol;
                winCombo = winningConditions.find(combination => {
                    return combination.every(idx => newBoard[idx] === window.mySymbol);
                }) || [];
            } else if (isTie) {
                status = 'finished';
                winner = 'tie';
            }
            
            const nextPlayer = window.mySymbol === 'X' ? 'O' : 'X';
            
            try {
                await updateDoc(docRef, {
                    board: newBoard,
                    currentPlayer: nextPlayer,
                    status: status,
                    winner: winner,
                    winCombo: winCombo,
                    lastUpdated: new Date().toISOString()
                });
            } catch (e) {
                console.error("Error committing online move:", e);
                showToast("Не удалось отправить ход", "error");
            }
        };

        // Reset game on cloud for both parties
        window.resetOnlineGame = async function() {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', window.currentRoomId);
            try {
                await updateDoc(docRef, {
                    board: ['', '', '', '', '', '', '', '', ''],
                    currentPlayer: 'X',
                    status: 'playing',
                    winner: '',
                    winCombo: [],
                    lastUpdated: new Date().toISOString()
                });
            } catch (e) {
                console.error("Error resetting online game:", e);
                showToast("Не удалось перезапустить игру", "error");
            }
        };

        // Expose to window for global access
        window.saveCloudData = saveCloudData;

        // Auto trigger connection
        window.addEventListener('DOMContentLoaded', () => {
            initSync();

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows

        const SVG_X = `

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (window.isMuted) return;
            initAudio();
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'x') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(330, now);
                osc.frequency.exponentialRampToValueAtTime(660, now + 0.08);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'o') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, now); // C5
                osc.frequency.exponentialRampToValueAtTime(783.99, now + 0.1); // G5
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.12);
                osc.start(now);
                osc.stop(now + 0.12);
            } else if (type === 'win') {
                const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50];
                const noteDuration = 0.07;
                notes.forEach((freq, i) => {
                    const noteOsc = audioCtx.createOscillator();
                    const noteGain = audioCtx.createGain();
                    noteOsc.connect(noteGain);
                    noteGain.connect(audioCtx.destination);
                    noteOsc.type = 'sawtooth';
                    noteOsc.frequency.setValueAtTime(freq, now + i * noteDuration);
                    noteGain.gain.setValueAtTime(0.08, now + i * noteDuration);
                    noteGain.gain.linearRampToValueAtTime(0.01, now + (i + 1) * noteDuration);
                    noteOsc.start(now + i * noteDuration);
                    noteOsc.stop(now + (i + 1) * noteDuration);
                });
            } else if (type === 'tie') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.25);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.25);
                osc.start(now);
                osc.stop(now + 0.25);
            }
        }

        function toggleMute() {

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
                const rand = Math.random();
                if (rand > 0.95) {
                    this.color = '#FF0000';
                } else if (rand > 0.90) {
                    this.color = '#0000F0';
                } else {
                    this.color = '#222';
                }
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color === '#222' ? 'transparent' : this.color;
                ctx.shadowBlur = this.color === '#222' ? 0 : 8;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function initParticles() {
            resizeCanvas();
            particles = [];
            const particleCount = Math.min(60, Math.floor((canvas.width * canvas.height) / 15000));
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }

            if (currentPlayer === 'X') {

        function cellClicked(cellIndex) {
            if (board[cellIndex] !== '' || !isGameActive) return;

            if (window.gameMode === 'online') {
                if (!window.isMyTurn || window.onlineStatus !== 'playing') return;
                window.makeOnlineMove(cellIndex);

            }

            // Block during AI move execution to prevent double tapping
            if (window.gameMode === 'ai' && currentPlayer === 'O') return;

            makeMove(cellIndex, currentPlayer);
        }

        function makeMove(cellIndex, player) {
            board[cellIndex] = player;
            const cell = document.querySelector(`[data-index="${cellIndex}"]`);
            cell.innerHTML = player === 'X' ? SVG_X : SVG_O;
            cell.classList.add('pointer-events-none');

            // Play interactive synth sound
            playSound(player.toLowerCase());

            // Check if victory has occurred
            if (checkWin(board, player)) {
                handleGameOver('win', player);
                return;
            }

            // Check if game is a tie
            if (!board.includes('')) {
                handleGameOver('tie');
                return;
            }

            // Alternate Turn
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            updateTurnIndicator();

            // Trigger AI Turn if enabled
            if (window.gameMode === 'ai' && currentPlayer === 'O' && isGameActive) {
                setTimeout(makeAIMove, 450); // Slight delay for natural feeling
            }
        }

        // Synchronize board representation visually (for online play)
        window.syncBoardState = function(newBoard) {
            for (let i = 0; i < 9; i++) {
                if (board[i] !== newBoard[i]) {
                    board[i] = newBoard[i];
                    const cell = document.querySelector(`[data-index="${i}"]`);
                    if (newBoard[i] === 'X') {
                        cell.innerHTML = SVG_X;
                        cell.classList.add('pointer-events-none');
                        playSound('x');
                    } else if (newBoard[i] === 'O') {
                        cell.innerHTML = SVG_O;
                        cell.classList.add('pointer-events-none');
                        playSound('o');
                    } else {
                        cell.innerHTML = '';
                        cell.classList.remove('pointer-events-none');
                    }
                }
            }
        };

        function checkWin(currentBoard, player) {
            return winningConditions.some(combination => {
                return combination.every(index => {
                    return currentBoard[index] === player;
                });
            });
        }

        function drawWinningLine(combination, player) {
            const line = document.getElementById('win-line');
            const boardContainer = document.getElementById('board-container');
            const cells = document.querySelectorAll('.grid-cell');
            
            // Coordinates of first and last cell of combination
            const startCell = cells[combination[0]].getBoundingClientRect();
            const endCell = cells[combination[2]].getBoundingClientRect();
            const boardRect = boardContainer.getBoundingClientRect();

            // Center of start and end cells relative to the board
            const x1 = startCell.left + startCell.width / 2 - boardRect.left;
            const y1 = startCell.top + startCell.height / 2 - boardRect.top;
            const x2 = endCell.left + endCell.width / 2 - boardRect.left;
            const y2 = endCell.top + endCell.height / 2 - boardRect.top;

            // Calculate distance and angle
            const length = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
            const angle = Math.atan2(y2 - y1, x2 - x1) * (180 / Math.PI);

            // Style line and trigger animation
            line.style.width = '0px';
            line.style.height = '6px';
            line.style.left = `${x1}px`;
            line.style.top = `${y1}px`;
            line.style.transform = `rotate(${angle}deg)`;
            
            line.className = `win-line ${player === 'X' ? 'red' : 'blue'}`;
            line.classList.remove('hidden');

            // Force reflow and extend
            setTimeout(() => {
                line.style.width = `${length}px`;
            }, 50);
        }

        function handleGameOver(result, player = null) {
            isGameActive = false;
            
            const modal = document.getElementById('game-modal');
            const modalTitle = document.getElementById('modal-title');
            const modalMessage = document.getElementById('modal-message');
            const symbolContainer = document.getElementById('modal-symbol-container');

            if (result === 'win') {
                window.scores[player]++;
                updateScoresUI();
                
                // Find and draw the winning line
                const winningCombo = winningConditions.find(combination => {
                    return combination.every(idx => board[idx] === player);
                });
                if (winningCombo) {
                    drawWinningLine(winningCombo, player);
                }

                // Cloud-sync state changes
                if (window.saveCloudData) window.saveCloudData();

                setTimeout(() => {
                    playSound('win');
                    // Setup Modal Content
                    symbolContainer.innerHTML = player === 'X' ? SVG_X : SVG_O;
                    const winnerName = player === 'X' ? window.player1Name : window.player2Name;
                    modalTitle.innerText = `${winnerName} победил!`;
                    modalTitle.className = `font-orbitron text-2xl font-black ${player === 'X' ? 'text-[#FF0000] glow-red' : 'text-[#0000F0] glow-blue'}`;
                    modalMessage.innerText = window.gameMode === 'ai' 
                        ? (player === 'X' ? `Вы сокрушили искусственный интеллект!` : `ИИ оказался умнее в этот раз...`)
                        : `${winnerName} доминирует на неоновой арене!`;
                    
                    modal.classList.remove('opacity-0', 'pointer-events-none');
                }, 750);

            } else {
                window.scores.ties++;
                updateScoresUI();
                
                // Cloud-sync state changes
                if (window.saveCloudData) window.saveCloudData();

                setTimeout(() => {
                    playSound('tie');
                    symbolContainer.innerHTML = SVG_TIE;
                    modalTitle.innerText = 'Ничья!';
                    modalTitle.className = "font-orbitron text-3xl font-black text-gray-400";
                    modalMessage.innerText = 'Никто не смог одержать верх. Сыграйте еще!';
                    
                    modal.classList.remove('opacity-0', 'pointer-events-none');
                }, 400);
            }
        }

        // Direct callback handler for online events
        window.handleGameOverDirect = function(result, winnerPlayer = null, winCombo = []) {
            isGameActive = false;
            
            const modal = document.getElementById('game-modal');
            const modalTitle = document.getElementById('modal-title');
            const modalMessage = document.getElementById('modal-message');
            const symbolContainer = document.getElementById('modal-symbol-container');

            if (result === 'win') {
                if (winCombo && winCombo.length === 3) {
                    drawWinningLine(winCombo, winnerPlayer);
                }

                setTimeout(() => {
                    playSound('win');
                    symbolContainer.innerHTML = winnerPlayer === 'X' ? SVG_X : SVG_O;
                    const winnerName = winnerPlayer === 'X' ? window.player1Name : window.player2Name;
                    modalTitle.innerText = `${winnerName} победил!`;
                    modalTitle.className = `font-orbitron text-2xl font-black ${winnerPlayer === 'X' ? 'text-[#FF0000] glow-red' : 'text-[#0000F0] glow-blue'}`;
                    
                    if (winnerPlayer === window.mySymbol) {
                        modalMessage.innerText = "Вы победили в сетевом поединке!";
                    } else {
                        modalMessage.innerText = "Соперник оказался сильнее в этот раз.";
                    }
                    
                    modal.classList.remove('opacity-0', 'pointer-events-none');
                }, 750);
            } else {
                setTimeout(() => {
                    playSound('tie');
                    symbolContainer.innerHTML = SVG_TIE;
                    modalTitle.innerText = 'Ничья!';
                    modalTitle.className = "font-orbitron text-3xl font-black text-gray-400";
                    modalMessage.innerText = 'Сетевой поединок окончен вничью!';
                    
                    modal.classList.remove('opacity-0', 'pointer-events-none');
                }, 400);
            }
        };

        function closeModalAndReset() {
            const modal = document.getElementById('game-modal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            
            if (window.gameMode === 'online') {
                window.resetOnlineGame();
            } else {
                resetGame(false);
            }
        }

        function makeAIMove() {
            let moveIndex;

            if (window.difficulty === 'easy') {
                moveIndex = getRandomMove();
            } else if (window.difficulty === 'medium') {
                if (Math.random() < 0.5) {
                    moveIndex = getOptimalMove();
                } else {
                    moveIndex = getRandomMove();
                }
            } else {
                moveIndex = getOptimalMove();
            }

            if (moveIndex !== null && moveIndex !== undefined) {
                makeMove(moveIndex, 'O');
            }
        }

        function getRandomMove() {
            let availableCells = [];
            board.forEach((val, idx) => {
                if (val === '') availableCells.push(idx);
            });
            if (availableCells.length === 0) return null;
            return availableCells[Math.floor(Math.random() * availableCells.length)];
        }

        function getOptimalMove() {
            let bestScore = -Infinity;
            let move;

            for (let i = 0; i < 9; i++) {
                if (board[i] === '') {
                    board[i] = 'O'; // Try AI move
                    let score = minimax(board, 0, false);
                    board[i] = ''; // Undo
                    if (score > bestScore) {
                        bestScore = score;
                        move = i;
                    }
                }
            }
            return move;
        }

        const scoresMinimax = {
            O: 10,  // AI Win
            X: -10, // Opponent Win
            tie: 0
        };

        function minimax(tempBoard, depth, isMaximizing) {
            if (checkWin(tempBoard, 'O')) return scoresMinimax.O - depth;
            if (checkWin(tempBoard, 'X')) return scoresMinimax.X + depth;
            if (!tempBoard.includes('')) return scoresMinimax.tie;

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (tempBoard[i] === '') {
                        tempBoard[i] = 'O';
                        let score = minimax(tempBoard, depth + 1, false);
                        tempBoard[i] = '';
                        bestScore = Math.max(score, bestScore);
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (tempBoard[i] === '') {
                        tempBoard[i] = 'X';
                        let score = minimax(tempBoard, depth + 1, true);
                        tempBoard[i] = '';
                        bestScore = Math.min(score, bestScore);
                    }
                }
                return bestScore;
            }
        }

        function resetGame(fullResetScore = false) {
            if (window.gameMode === 'online') {
                if (fullResetScore) {
                    showToast("В режиме по сети сброс счета выполняется созданием новой комнаты.", "info");
                }
                window.resetOnlineGame();
                return;
            }

            board = ['', '', '', '', '', '', '', '', ''];
            currentPlayer = 'X'; // Red X always starts
            isGameActive = true;

            const cells = document.querySelectorAll('.grid-cell');
            cells.forEach(cell => {
                cell.innerHTML = '';
                cell.classList.remove('pointer-events-none');
            });

            const line = document.getElementById('win-line');
            line.classList.add('hidden');
            line.style.width = '0px';

            if (fullResetScore) {
                window.scores = { X: 0, O: 0, ties: 0 };
                updateScoresUI();
                if (window.saveCloudData) window.saveCloudData();
            }

            updateTurnIndicator();
        }

        // Bind core triggers to window scope
        window.setGameMode = setGameMode;
        window.setDifficulty = setDifficulty;
        window.applyLoadedSettings = applyLoadedSettings;
        window.startGame = startGame;
        window.backToMenu = backToMenu;
        window.cellClicked = cellClicked;
        window.toggleMute = toggleMute;
        window.resetGame = resetGame;
        window.closeModalAndReset = closeModalAndReset;

        window.onload = function() {
            initParticles();
            animateParticles();
            updateTurnIndicator();

            const boardContainer = document.getElementById('board-container');
            boardContainer.style.borderColor = 'rgba(255, 255, 255, 0.08)';
            
            // Set default game mode visually
            setGameMode('ai');
        };
    </script>
